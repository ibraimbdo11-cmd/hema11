<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEMA - دخول</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    color:#00ff66;
    overflow:hidden;
}

/* خلفية نيون بسيطة */
.bg{
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle at center, rgba(0,255,102,0.08), black 70%);
}

/* الكارت */
.box{
    position:relative;
    width:90%;
    max-width:380px;
    text-align:center;
    padding:45px 25px;
    border:1px solid #00ff66;
    border-radius:25px;
    background:rgba(0,0,0,0.8);
    box-shadow:0 0 25px rgba(0,255,102,0.25);
    animation:fadeIn 0.8s ease;
}

h1{
    font-size:50px;
    text-shadow:0 0 15px #00ff66;
}

p{
    color:#bbb;
    margin:15px 0 25px;
}

/* زر */
.btn{
    display:block;
    padding:12px;
    border:1px solid #00ff66;
    color:#00ff66;
    border-radius:30px;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    background:#00ff66;
    color:black;
    box-shadow:0 0 20px #00ff66;
}

/* أنيميشن دخول */
@keyframes fadeIn{
    from{
        transform:translateY(20px);
        opacity:0;
    }
    to{
        transform:translateY(0);
        opacity:1;
    }
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="box">

    <h1>HEMA</h1>
    <p>أهلاً بك في الموقع</p>

    <a class="btn" href="#" onclick="enterSite()">
        دخول
    </a>

</div>

<script>
function enterSite(){
    sessionStorage.setItem("entered","true");
    window.location.href = "index.html";
}
</script>

</body>
</html>
