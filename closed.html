<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HEMA - مغلق حالياً</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo', sans-serif;
}

body{
    background:black;
    color:#00ff66;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* خلفية */
.bg{
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at center,
    rgba(0,255,102,0.08),
    black 70%);
}

/* الكارت */
.box{
    position:relative;
    width:90%;
    max-width:500px;
    padding:45px 30px;
    text-align:center;
    border:1px solid #00ff66;
    border-radius:25px;
    background:rgba(0,0,0,0.8);
    box-shadow:0 0 30px rgba(0,255,102,0.25);
    animation:fade 1s ease;
}

h1{
    font-size:55px;
    margin-bottom:15px;
    text-shadow:0 0 15px #00ff66;
}

.status{
    display:inline-block;
    margin-bottom:20px;
    padding:8px 18px;
    border:1px solid #00ff66;
    border-radius:30px;
    background:#111;
    font-size:14px;
}

p{
    color:#bdbdbd;
    line-height:2;
    margin-bottom:25px;
}

.note{
    color:#00ff66;
    font-weight:bold;
}

/* انيميشن */
@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* موبايل */
@media(max-width:768px){

    h1{
        font-size:40px;
    }

    .box{
        padding:35px 20px;
    }

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="box">

    <div class="status">
        الموقع مغلق حالياً
    </div>

    <h1>HEMA</h1>

    <p>
        تم إيقاف الخدمات حالياً حتى إشعار آخر.
        <br><br>
        نشكركم على استخدام الموقع ❤️
    </p>

    <div class="note">
        سيتم العودة قريباً
    </div>

</div>

</body>
</html>
